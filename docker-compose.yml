services:
  backend:
    build:
      context: ./backend
    environment:
      CORS_ORIGINS: "*"
      MAX_UPLOAD_MB: "10"
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
